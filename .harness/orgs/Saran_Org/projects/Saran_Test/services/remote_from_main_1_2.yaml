service:
  name: remote from main 1- 2
  identifier: remote_from_main_1_2
  orgIdentifier: Saran_Org
  projectIdentifier: Saran_Test
  serviceDefinition:
    spec:
      manifests:
        - manifest:
            identifier: kjn
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: <+input>
                  gitFetchType: Branch
                  paths:
                    - /asd
                  repoName: sd
                  branch: asd
              skipResourceVersioning: false
              enableDeclarativeRollback: false
    type: Kubernetes
