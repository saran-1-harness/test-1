service:
  name: Remote - kubernetes - RTI
  identifier: Remote_kubernetes_RTI
  tags: {}
  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: asas
            spec:
              store:
                spec:
                  connectorRef: <+input>
                  repoName: <+input>
                  gitFetchType: Branch
                  branch: <+input>
                  paths: <+input>
                type: Github
              optionalValuesYaml: false
              enableDeclarativeRollback: false
              skipResourceVersioning: false
            type: K8sManifest
      artifacts: {}
